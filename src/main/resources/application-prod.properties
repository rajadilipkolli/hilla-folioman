# Production HTTPS / SSL Configuration
# These are placeholders and should be configured via environment variables or a secure vault
server.ssl.enabled=false
# server.ssl.key-store=classpath:keystore.p12
# server.ssl.key-store-password=${SSL_KEY_STORE_PASSWORD}
# server.ssl.key-store-type=PKCS12
# server.ssl.key-alias=tomcat

# CORS Configuration
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:}

# Secure session cookies
server.servlet.session.cookie.secure=true

# Security Configuration
# JWT Secret MUST be overridden in production via the APP_JWT_SECRET environment variable!
app.jwt.secret=${APP_JWT_SECRET}

# Production Database Password
# SPRING_DATASOURCE_PASSWORD environment variable should be used
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
